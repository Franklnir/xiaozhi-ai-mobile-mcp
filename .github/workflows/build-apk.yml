name: Build Android APK

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Generate debug keystore
        run: |
          mkdir -p android/app
          keytool -genkeypair \
            -v \
            -storetype PKCS12 \
            -keystore android/app/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Build Debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon -x lint

      - name: Rename APK
        run: |
          mkdir -p build-output
          cp android/app/build/outputs/apk/debug/app-debug.apk build-output/SciG-Mode-MCP-v1.0.0.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: scig-mode-mcp-apk
          path: build-output/SciG-Mode-MCP-v1.0.0.apk
          retention-days: 90

      - name: Create Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build-output/SciG-Mode-MCP-v1.0.0.apk
          name: "SciG Mode MCP Mobile v1.0.0"
          body: |
            ## 📱 SciG Mode MCP Mobile App
            
            Download APK dan install di perangkat Android Anda.
            
            **Fitur:**
            - 🔐 Login aman dengan akun SciG Mode
            - 🤖 Kontrol mode & persona AI  
            - 💬 Monitor chat Xiaozhi realtime
            - ⚙️ Atur bahasa terjemahan
            
            **Minimum:** Android 8.0+
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
