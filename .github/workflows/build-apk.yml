name: Build Android APK

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Prepare release keystore
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/scig-upload.keystore

      - name: Resolve Version
        id: vars
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$(node -p "require('./package.json').version")"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build Release APK
        working-directory: android
        env:
          SCIG_UPLOAD_STORE_FILE: ${{ github.workspace }}/android/app/scig-upload.keystore
          SCIG_UPLOAD_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          SCIG_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          SCIG_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon -x lint

      - name: Rename APK
        run: |
          mkdir -p build-output
          cp android/app/build/outputs/apk/release/app-release.apk build-output/SciG-Mode-MCP-v${{ steps.vars.outputs.version }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: scig-mode-mcp-apk
          path: build-output/SciG-Mode-MCP-v${{ steps.vars.outputs.version }}.apk
          retention-days: 90

      - name: Create Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build-output/SciG-Mode-MCP-v${{ steps.vars.outputs.version }}.apk
          name: "SciG Mode MCP Mobile v${{ steps.vars.outputs.version }}"
          body: |
            ## 📱 SciG Mode MCP Mobile App
            
            Download APK dan install di perangkat Android Anda.
            
            **Fitur:**
            - 🔐 Login aman dengan akun SciG Mode
            - 🤖 Kontrol mode & persona AI  
            - 💬 Monitor chat Xiaozhi realtime
            - ⚙️ Atur bahasa terjemahan
            
            **Minimum:** Android 8.0+
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
